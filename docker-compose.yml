services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chatfr
      POSTGRES_PASSWORD: chatfr
      POSTGRES_DB: chatfr
    volumes:
      - chatfr_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - chatfr_redisdata:/data

volumes:
  chatfr_pgdata:
  chatfr_redisdata:
