name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "24 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit Production Dependencies
        run: npm audit --omit=dev --audit-level=moderate
